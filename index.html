<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MF Research Lab — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#04080f;--s1:#0a1120;--s2:#0f1a2e;--s3:#141e2e;
  --border:#1c2a3e;--b2:#243347;
  --amber:#f0a500;--a2:#ffc740;--glow:rgba(240,165,0,0.1);
  --text:#e2e8f4;--m:#5a6a84;--m2:#7a8da8;
  --teal:#2dd4bf;--red:#f87171;--warn:#fbbf24;
  --blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(135deg,#04080f,#070f1d 55%,#0a1628);border-bottom:1px solid var(--border);padding:12px 15px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:11px}
.logo{width:33px;height:33px;border-radius:9px;background:linear-gradient(135deg,var(--amber),#e07800);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem;color:#04080f;flex-shrink:0}
.ht{font-family:'Playfair Display',serif;font-size:1.03rem;font-weight:900;background:linear-gradient(135deg,var(--amber),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hs{font-size:.65rem;color:var(--m);margin-top:1px}
.lv{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--teal);font-weight:600;flex-shrink:0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:bl 2s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* SEARCH */
.sz{background:var(--s1);border-bottom:1px solid var(--border);padding:11px 14px;position:relative;z-index:90}
.sw{position:relative;margin-bottom:9px}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--m);font-size:.9rem;pointer-events:none}
.sinp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.87rem;padding:11px 38px 11px 35px;outline:none;transition:border-color .15s}
.sinp:focus{border-color:var(--amber)}
.sinp::placeholder{color:var(--m)}
.sclr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--m);font-size:.9rem;cursor:pointer;display:none;padding:4px 6px;border-radius:5px}
.sclr:hover{color:var(--text)}
.sdd{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s1);border:1px solid var(--b2);border-radius:10px;max-height:340px;overflow-y:auto;z-index:999;box-shadow:0 20px 50px rgba(0,0,0,.75);display:none}
.sdd.open{display:block}
.di{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;flex-direction:column;gap:3px}
.di:last-child{border-bottom:none}
.di:hover,.di.foc{background:var(--s2)}
.dn{font-size:.82rem;font-weight:500;line-height:1.35}
.dm{font-size:.64rem;color:var(--m);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.dmsg{padding:13px;text-align:center;color:var(--m);font-size:.78rem}
.spin{display:inline-block;width:10px;height:10px;border:2px solid var(--b2);border-top-color:var(--amber);border-radius:50%;animation:sp .7s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* CATS */
.cats{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px}
.cats::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--m);transition:all .15s;white-space:nowrap}
.cpill.on{background:var(--glow);border-color:var(--amber);color:var(--amber)}

/* TABS */
.tabs{display:flex;gap:2px;padding:9px 12px 0;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:8px 12px;border-radius:8px 8px 0 0;border:1px solid transparent;background:transparent;color:var(--m);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.tb:hover{color:var(--text);background:var(--s2)}
.tb.on{color:var(--amber);background:var(--bg);border-color:var(--border);border-bottom-color:var(--bg)}
.bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom)}
@media(min-width:900px){.bnav{display:none}.tabs{display:flex}}
@media(max-width:899px){.tabs{display:none}}
.bb{flex:1;background:none;border:none;color:var(--m);font-size:.55rem;padding:7px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s}
.bb .ic{font-size:1rem}
.bb.on{color:var(--amber)}

/* PANELS */
.panel{display:none;padding:13px 13px 90px;animation:fu .2s ease}
.panel.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY & SKEL */
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:55px 20px;text-align:center;gap:11px;min-height:200px}
.ei{font-size:2.3rem}.et{font-family:'Playfair Display',serif;font-size:1.02rem;color:var(--m2)}.esub{font-size:.76rem;color:var(--m);max-width:280px;line-height:1.65}
.sk{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:13px;position:relative;overflow:hidden}
.ca::before,.ct::before,.cb::before,.cp::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.ca::before{background:linear-gradient(90deg,var(--amber),transparent)}
.ct::before{background:linear-gradient(90deg,var(--teal),transparent)}
.cb::before{background:linear-gradient(90deg,var(--blue),transparent)}
.cp::before{background:linear-gradient(90deg,var(--purple),transparent)}
.ctit{font-family:'Playfair Display',serif;font-size:.91rem;color:var(--amber);margin-bottom:12px;display:flex;align-items:center;gap:7px}

/* HERO */
.hero{background:linear-gradient(135deg,var(--s1),#0b1829);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:13px}
.hn{font-family:'Playfair Display',serif;font-size:1.03rem;font-weight:700;line-height:1.3;margin-bottom:7px}
.hm{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{font-size:.63rem;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.ta{background:rgba(240,165,0,.12);color:var(--amber);border:1px solid rgba(240,165,0,.25)}
.tb2{background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.tt{background:rgba(45,212,191,.1);color:var(--teal);border:1px solid rgba(45,212,191,.2)}
.tw{background:rgba(251,191,36,.1);color:var(--warn);border:1px solid rgba(251,191,36,.2)}
.td{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}

/* KPI */
.k4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:479px){.k4{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.kv{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600;color:var(--amber);display:block}
.kv.pos{color:var(--teal)}.kv.neg{color:var(--red)}.kv.neu{color:var(--blue)}
.kl{font-size:.61rem;color:var(--m);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

/* RETURNS */
.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
@media(min-width:480px){.rg{grid-template-columns:repeat(8,1fr)}}
.rc{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 4px;text-align:center}
.rp{font-size:.59rem;color:var(--m);text-transform:uppercase;margin-bottom:2px}
.rv{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:600}

/* RATIO ROWS */
.rrow{display:flex;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)}
.rrow:last-child{border-bottom:none}
.rl{font-size:.79rem;color:var(--m2);flex:1}
.ri{font-size:.61rem;color:var(--m);margin-top:2px}
.rval{font-family:'JetBrains Mono',monospace;font-size:.86rem;font-weight:600;text-align:right;flex-shrink:0}
.rb{width:100%;height:3px;background:var(--s3);border-radius:2px;margin-top:4px;overflow:hidden}
.rbf{height:100%;border-radius:2px;transition:width .6s}

/* SECTORS */
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.snm{flex:1;font-size:.77rem}
.sbg{width:85px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;flex-shrink:0}
.sbf{height:100%;border-radius:3px;transition:width .6s}
.spct{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--amber);min-width:34px;text-align:right}

/* HOLDINGS */
.ht{width:100%;border-collapse:collapse;font-size:.74rem}
.ht th{padding:7px 7px;color:var(--m);text-align:left;border-bottom:1px solid var(--border);font-weight:500;font-size:.65rem;text-transform:uppercase;letter-spacing:.04em}
.ht td{padding:8px 7px;border-bottom:1px solid var(--border)}
.ht tr:last-child td{border-bottom:none}
.ht tr:hover td{background:rgba(240,165,0,.025)}
.hcap{font-size:.62rem;padding:2px 6px;border-radius:10px;font-weight:700;text-transform:uppercase}
.cL{background:rgba(45,212,191,.1);color:var(--teal)}.cM{background:rgba(251,191,36,.1);color:var(--warn)}.cS{background:rgba(248,113,113,.1);color:var(--red)}

/* COMPARE */
.ccps{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.ccp{padding:5px 11px;border-radius:20px;font-size:.7rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--m);transition:all .15s}
.ccp.on{background:var(--glow);border-color:var(--amber);color:var(--amber)}
.ctw{overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ctbl{width:100%;border-collapse:collapse;font-size:.74rem}
.ctbl th{padding:7px 9px;color:var(--m);font-size:.64rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--s1);position:sticky;top:0}
.ctbl td{padding:7px 9px;border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl tr:last-child td{border-bottom:none}
.crl{color:var(--m2);font-size:.74rem}
.bst{color:var(--teal)!important;font-weight:700}

/* AI */
.aiqs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.aiq{padding:6px 11px;border-radius:20px;font-size:.69rem;font-weight:500;cursor:pointer;border:1px solid var(--b2);background:var(--s2);color:var(--m2);transition:all .15s}
.aiq:hover{border-color:var(--amber);color:var(--amber)}
.aipr{display:flex;gap:8px;margin-bottom:11px}
.aiin{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.83rem;padding:10px 12px;outline:none}
.aiin:focus{border-color:var(--amber)}
.aigo{background:var(--amber);color:#04080f;border:none;border-radius:10px;padding:10px 15px;font-family:'DM Sans',sans-serif;font-size:.79rem;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s}
.aigo:hover{opacity:.88}.aigo:disabled{opacity:.45;cursor:not-allowed}
.aidots{display:flex;gap:5px;align-items:center;padding:10px 0}
.aid{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:aip 1.2s ease infinite}
.aid:nth-child(2){animation-delay:.2s}.aid:nth-child(3){animation-delay:.4s}
@keyframes aip{0%,100%{opacity:.3;transform:scale(.9)}50%{opacity:1;transform:scale(1.1)}}
.airsp{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px;line-height:1.78;font-size:.82rem}
.verdict{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;margin-bottom:12px;border:1px solid}
.vbuy{background:rgba(45,212,191,.07);border-color:rgba(45,212,191,.3)}
.vhold{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.3)}
.vavoid{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.3)}

/* RANGE BTNS */
.rbs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.rbt{padding:4px 10px;border-radius:7px;font-size:.68rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--m);transition:all .15s}
.rbt.on{background:var(--glow);border-color:var(--amber);color:var(--amber)}

/* MISC */
.note{font-size:.71rem;color:var(--m);line-height:1.6;padding:9px 11px;background:var(--s2);border-radius:8px;margin-top:8px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.two{grid-template-columns:1fr}}
.sx{overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.cw{position:relative;width:100%;overflow:hidden}

/* SIP CALCULATOR */
.mode-row{display:flex;gap:7px;margin-bottom:14px}
.mode-btn{flex:1;padding:9px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--m);transition:all .15s;text-align:center}
.mode-btn.on{background:var(--glow);border-color:var(--amber);color:var(--amber)}
.sip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:479px){.sip-grid{grid-template-columns:1fr}}
.sfield{display:flex;flex-direction:column;gap:5px}
.sfield label{font-size:.7rem;color:var(--m2);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.sfinp{background:var(--s2);border:1px solid var(--b2);border-radius:9px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.9rem;padding:10px 13px;outline:none;transition:border-color .15s;width:100%}
.sfinp:focus{border-color:var(--amber)}
.res-big{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--amber);display:block;margin-bottom:3px}
.res-sub{font-size:.72rem;color:var(--m)}
.xirr-banner{background:linear-gradient(135deg,rgba(240,165,0,.1),rgba(240,165,0,.03));border:1px solid rgba(240,165,0,.25);border-radius:11px;padding:15px;margin-bottom:13px;text-align:center}
.sip-result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
@media(max-width:420px){.sip-result-grid{grid-template-columns:1fr 1fr}}
.calc-btn{width:100%;background:var(--amber);color:#04080f;border:none;border-radius:9px;padding:11px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:4px}
.calc-btn:hover{opacity:.88}

/* WATCHLIST */
.wl-item{background:var(--s1);border:1px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s;position:relative}
.wl-item:hover{border-color:var(--b2)}
.wl-item.cur{border-color:var(--amber)}
.wl-name{flex:1;min-width:0}
.wl-fn{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.wl-meta{font-size:.65rem;color:var(--m);display:flex;gap:8px;flex-wrap:wrap}
.wl-right{text-align:right;flex-shrink:0}
.wl-nav{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:600;color:var(--amber)}
.wl-1y{font-size:.7rem;font-family:'JetBrains Mono',monospace;margin-top:2px}
.wl-del{background:none;border:none;color:var(--m);font-size:.78rem;cursor:pointer;padding:3px 7px;border-radius:5px;opacity:.55;flex-shrink:0}
.wl-del:hover{opacity:1;color:var(--red)}
.wl-add-btn{width:100%;padding:11px;background:transparent;border:1px dashed var(--b2);border-radius:11px;color:var(--m2);font-family:'DM Sans',sans-serif;font-size:.79rem;font-weight:500;cursor:pointer;transition:all .15s;margin-top:2px}
.wl-add-btn:hover{border-color:var(--amber);color:var(--amber)}

/* POPULAR FUNDS PANEL */
.pop-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:2px}
@media(min-width:580px){.pop-grid{grid-template-columns:repeat(3,1fr)}}
.pop-btn{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 11px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.pop-btn:hover{border-color:var(--amber);background:var(--glow)}
.pop-name{font-size:.74rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.pop-cat{font-size:.6rem;color:var(--m);text-transform:uppercase;letter-spacing:.03em}
.slbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;color:var(--m);margin:14px 0 8px;display:flex;align-items:center;gap:7px}
.slbl::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">MF</div>
  <div>
    <div class="ht">MF Research Lab</div>
    <div class="hs">Live · All Indian Mutual Funds · mfapi.in</div>
  </div>
  <div class="lv"><span class="dot"></span>LIVE</div>
</header>

<!-- WORKER STATUS BAR -->
<div id="wstatus-bar" style="background:rgba(251,191,36,.07);border-bottom:1px solid rgba(251,191,36,.2);padding:8px 15px;display:flex;align-items:center;gap:8px;font-size:.72rem;flex-wrap:wrap">
  <span id="wstatus-icon">⏳</span>
  <span id="wstatus-text" style="color:var(--warn)">Connecting to Worker…</span>
  <button onclick="retryWorker()" style="margin-left:auto;background:transparent;border:1px solid var(--warn);color:var(--warn);border-radius:6px;padding:3px 10px;font-size:.68rem;cursor:pointer;font-family:'DM Sans',sans-serif">Retry</button>
</div>

<!-- SEARCH -->
<div class="sz">
  <div class="sw">
    <span class="sico">🔍</span>
    <input class="sinp" id="sinp" placeholder="Search any fund — e.g. Parag Parikh Flexi Cap, Axis Bluechip, Quant ELSS…" autocomplete="off" spellcheck="false">
    <button class="sclr" id="sclr" onclick="clearS()">✕</button>
    <div class="sdd" id="sdd"></div>
  </div>
  <div class="cats" id="catrow"></div>
</div>

<!-- TABS -->
<nav class="tabs">
  <button class="tb on" onclick="switchTab('overview')">📋 Overview</button>
  <button class="tb"    onclick="switchTab('ratios')">📐 Ratios</button>
  <button class="tb"    onclick="switchTab('navchart')">📈 NAV Chart</button>
  <button class="tb"    onclick="switchTab('holdings')">📦 Holdings</button>
  <button class="tb"    onclick="switchTab('sip')">🧮 SIP Calc</button>
  <button class="tb"    onclick="switchTab('compare')">⚖️ Compare</button>
  <button class="tb"    onclick="switchTab('watchlist')">⭐ Watchlist</button>
  <button class="tb"    onclick="switchTab('ai')">🤖 AI</button>
</nav>

<div id="p-overview"  class="panel on"></div>
<div id="p-ratios"    class="panel"></div>
<div id="p-navchart"  class="panel"></div>
<div id="p-holdings"  class="panel"></div>
<div id="p-sip"       class="panel"></div>
<div id="p-compare"   class="panel"></div>
<div id="p-watchlist" class="panel"></div>
<div id="p-ai"        class="panel"></div>

<nav class="bnav">
  <button class="bb on" onclick="switchTab('overview')"><span class="ic">📋</span>Overview</button>
  <button class="bb"    onclick="switchTab('ratios')"><span class="ic">📐</span>Ratios</button>
  <button class="bb"    onclick="switchTab('navchart')"><span class="ic">📈</span>NAV</button>
  <button class="bb"    onclick="switchTab('sip')"><span class="ic">🧮</span>SIP</button>
  <button class="bb"    onclick="switchTab('compare')"><span class="ic">⚖️</span>Compare</button>
  <button class="bb"    onclick="switchTab('watchlist')"><span class="ic">⭐</span>Watch</button>
  <button class="bb"    onclick="switchTab('ai')"><span class="ic">🤖</span>AI</button>

// ─── Worker status bar helpers ───────────────────
function setWorkerStatus(state, msg){
  const bar=document.getElementById('wstatus-bar');
  const icon=document.getElementById('wstatus-icon');
  const text=document.getElementById('wstatus-text');
  if(!bar||!icon||!text) return;
  const S={
    ok:      {bg:'rgba(45,212,191,.07)', bd:'rgba(45,212,191,.2)', col:'var(--teal)',ico:'✅'},
    loading: {bg:'rgba(251,191,36,.07)', bd:'rgba(251,191,36,.2)', col:'var(--warn)',ico:'⏳'},
    error:   {bg:'rgba(248,113,113,.07)',bd:'rgba(248,113,113,.2)',col:'var(--red)', ico:'❌'},
  };
  const s=S[state]||S.loading;
  bar.style.background=s.bg; bar.style.borderBottomColor=s.bd;
  icon.textContent=s.ico; text.style.color=s.col; text.textContent=msg;
  if(state==='ok') setTimeout(()=>{ bar.style.display='none'; },4000);
}
function retryWorker(){
  fundsLoaded=false; fundsLoading=false;
  setWorkerStatus('loading','Retrying…');
  loadAllFunds();
}

// ─── LOAD ALL FUNDS via AMFI (through Worker) ────
async function loadAllFunds(){
  if(fundsLoaded||fundsLoading)return;
  fundsLoading=true;
  setWorkerStatus('loading','Loading fund list from AMFI via Worker…');
  const inp=document.getElementById('sinp');
  if(inp) inp.placeholder='Loading fund list… (~2 sec, one-time)';
  try{
    const res=await fetch(mfUrl('/nav-list'));
    if(res.status===404){
      throw new Error('Worker needs updating — paste new mf-ai-proxy-worker.js in Cloudflare and Save & Deploy');
    }
    if(!res.ok) throw new Error(`Worker returned HTTP ${res.status}`);

    // Worker now returns raw AMFI text, not JSON — parse it here
    const text=await res.text();
    // Check if it's an error JSON
    if(text.trim().startsWith('{')){
      const j=JSON.parse(text);
      if(j.error) throw new Error(j.error);
    }
    // Parse AMFI semicolon-delimited text
    // Format: SchemeCode;ISIN1;ISIN2;SchemeName;NAV;Date
    allFunds=[];
    for(const raw of text.split('\n')){
      const line=raw.trim();
      if(!line||!/^\d/.test(line)) continue;
      const p=line.split(';');
      if(p.length<5) continue;
      const code=parseInt(p[0],10);
      const name=p[3]?.trim();
      const nav=parseFloat(p[4]);
      const date=p[5]?.trim()||'';
      if(!code||!name||isNaN(nav)) continue;
      allFunds.push({schemeCode:code, schemeName:name, nav, navDate:date});
    }
    if(!allFunds.length) throw new Error('AMFI returned empty fund list — try again in a moment');
    fundsLoaded=true;
    setWorkerStatus('ok',`${allFunds.length.toLocaleString()} funds loaded`);
    if(inp) inp.placeholder=`Search any of ${allFunds.length.toLocaleString()} funds — e.g. Parag Parikh, Axis Bluechip…`;
    console.log(`✅ Loaded ${allFunds.length} funds from AMFI`);
  }catch(err){
    console.error('loadAllFunds error:',err);
    setWorkerStatus('error', err.message);
    if(inp) inp.placeholder='Fund list unavailable — see error above';
  }finally{
    fundsLoading=false;
  }
}

// ─── SEARCH ──────────────────────────────────────
function bindSearch(){
  const inp=document.getElementById('sinp'),dd=document.getElementById('sdd'),clr=document.getElementById('sclr');
  inp.addEventListener('input',()=>{
    const q=inp.value.trim();
    clr.style.display=q?'block':'none';
    clearTimeout(stmr);
    if(q.length<2){dd.classList.remove('open');return;}
    // Instant client-side search if list loaded, otherwise debounce live search
    if(fundsLoaded){ doSearchLocal(q); }
    else { stmr=setTimeout(()=>doSearchLive(q),300); }
  });
  inp.addEventListener('keydown',e=>{
    const its=dd.querySelectorAll('.di');
    if(e.key==='ArrowDown'){ddIdx=Math.min(ddIdx+1,its.length-1);hilDD(its);e.preventDefault();}
    else if(e.key==='ArrowUp'){ddIdx=Math.max(ddIdx-1,0);hilDD(its);e.preventDefault();}
    else if(e.key==='Enter'&&ddIdx>=0)its[ddIdx]?.click();
    else if(e.key==='Escape')dd.classList.remove('open');
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.sw'))dd.classList.remove('open');});
}
function hilDD(its){its.forEach((el,i)=>el.classList.toggle('foc',i===ddIdx));its[ddIdx]?.scrollIntoView({block:'nearest'});}
function clearS(){
  document.getElementById('sinp').value='';
  document.getElementById('sclr').style.display='none';
  document.getElementById('sdd').classList.remove('open');
  ddIdx=-1;
}

// PRIMARY: instant client-side search from cached list
function doSearchLocal(q){
  const dd=document.getElementById('sdd');
  dd.classList.add('open');ddIdx=-1;
  const ql=q.toLowerCase();
  // Score: name starts with query > contains all words > contains query
  const words=ql.split(/\s+/).filter(Boolean);
  let results=allFunds.filter(f=>{
    const nl=f.schemeName.toLowerCase();
    return words.every(w=>nl.includes(w));
  });
  // Apply category filter
  if(curCat!=='All'){
    const kws=CKW[curCat]||[];
    if(kws.length){
      const cat=results.filter(x=>kws.some(k=>x.schemeName.toLowerCase().includes(k)));
      if(cat.length>0) results=cat;
    }
  }
  // Sort: exact start match first, then shorter names first
  results.sort((a,b)=>{
    const al=a.schemeName.toLowerCase(), bl=b.schemeName.toLowerCase();
    const as=al.startsWith(ql)?0:1, bs=bl.startsWith(ql)?0:1;
    if(as!==bs)return as-bs;
    return a.schemeName.length-b.schemeName.length;
  });
  if(!results.length){
    dd.innerHTML=`<div class="dmsg">No funds found for "<b>${q}</b>"</div>`;
    return;
  }
  renderDropdown(results.slice(0,35),q,dd);
}

// FALLBACK: live API search when list not yet loaded
async function doSearchLive(q){
  const dd=document.getElementById('sdd');
  // If still loading the full list, show spinner and retry once loaded
  if(fundsLoading){
    dd.innerHTML=`<div class="dmsg"><span class="spin"></span>Loading fund database… please wait</div>`;
    dd.classList.add('open');
    // Poll until loaded
    const poll=setInterval(()=>{
      if(fundsLoaded){ clearInterval(poll); doSearchLocal(q); }
      else if(!fundsLoading){ clearInterval(poll); doSearchApiSearch(q); }
    },200);
    return;
  }
  doSearchApiSearch(q);
}

// FALLBACK: if full list not available, try Worker /nav-list again
async function doSearchApiSearch(q){
  const dd=document.getElementById('sdd');
  dd.innerHTML=`<div class="dmsg"><span class="spin"></span>Loading fund list…</div>`;
  dd.classList.add('open');ddIdx=-1;
  try{
    const res=await fetch(mfUrl('/nav-list'));
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(text.trim().startsWith('{')){const j=JSON.parse(text);if(j.error)throw new Error(j.error);}
    allFunds=[];
    for(const raw of text.split('\n')){
      const line=raw.trim();
      if(!line||!/^\d/.test(line))continue;
      const p=line.split(';');
      if(p.length<5)continue;
      const code=parseInt(p[0],10),name=p[3]?.trim(),nav=parseFloat(p[4]),date=p[5]?.trim()||'';
      if(!code||!name||isNaN(nav))continue;
      allFunds.push({schemeCode:code,schemeName:name,nav,navDate:date});
    }
    fundsLoaded=true;
    doSearchLocal(q);
  }catch(err){
    console.error('Search fallback error:',err);
    dd.innerHTML=`<div class="dmsg" style="color:var(--red)">⚠️ Could not load fund list<br><small style="color:var(--m)">${err.message}</small></div>`;
  }
}

// ─── LOAD FUND ───────────────────────────────────────────────────────────
// Fund list:    Worker → AMFI NAVAll.txt        (needs CORS proxy) ✅
// Fund history: Browser → mfapi.in DIRECTLY     (mfapi has CORS *, no proxy needed)
// AI analysis:  Worker → Anthropic              (needs key proxy) ✅
async function loadFund(code, name) {
  document.getElementById('sinp').value = name;
  document.getElementById('sclr').style.display = 'block';
  document.getElementById('sdd').classList.remove('open');
  showSkel(curTab); killCharts();

  try {
    // Call mfapi.in directly from the browser — it has Access-Control-Allow-Origin: *
    // so browsers can call it cross-origin without a proxy.
    // We only can't use it FROM the Worker (Cloudflare IPs are blocked by mfapi.in).
    const res = await fetch(`https://api.mfapi.in/mf/${code}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error(`mfapi.in returned HTTP ${res.status}`);
    const raw = await res.json();

    let navRaw, meta;
    if (raw?.data && Array.isArray(raw.data)) {
      navRaw = raw.data; meta = raw.meta || {};
    } else if (Array.isArray(raw)) {
      navRaw = raw; meta = {};
    } else {
      throw new Error('Unexpected response from mfapi.in');
    }
    if (!navRaw.length) throw new Error('No NAV history returned for this fund');

    // mfapi returns newest-first → reverse to oldest-first
    const navData = [...navRaw].reverse();

    const enrich = getE(name);
    const meta2 = {
      fund_house:        meta.fund_house || enrich?.amc || '',
      scheme_category:   meta.scheme_category || enrich?.cat || '',
      scheme_start_date: meta.scheme_start_date || navData[0]?.date || '',
    };

    fund = { code: String(code), name, meta: meta2, navData,
             computed: calcMetrics(navData), enrich, detail: getD(name) };

    if (!cmp.find(f => f.code === fund.code)) {
      if (cmp.length >= 6) cmp.shift();
      cmp.push(fund);
    }
    renderTab(curTab);

  } catch (e) {
    console.error('loadFund:', e);
    document.getElementById('p-' + curTab).innerHTML =
      `<div class="es"><div class="ei">❌</div>
       <div class="et">Could not load fund data</div>
       <div class="esub">${e.message}<br><br>
       <small>mfapi.in may be temporarily slow. Please try again.</small></div></div>`;
  }
}

// ─── COMPUTE METRICS ─────────────────────────────
function calcMetrics(navData){
  if(!navData||navData.length<10)return{err:'Insufficient data'};
  const navs=navData.map(d=>parseFloat(d.nav)).filter(n=>!isNaN(n)&&n>0);
  const dates=navData.map(d=>parseNavDate(d.date));
  if(navs.length<10)return{err:'Not enough valid NAV points'};

  const L=navs[navs.length-1],LD=dates[dates.length-1];

  function navAgo(days){
    const t=new Date(+LD-days*86400000);
    let best=navs[0],bd=Infinity;
    for(let i=0;i<dates.length;i++){const d=Math.abs(+dates[i]-+t);if(d<bd){bd=d;best=navs[i];}}
    return best;
  }
  const sr=o=>o>0?(((L-o)/o)*100).toFixed(2):null;
  const cagr=(o,y)=>o>0&&y>0?((Math.pow(L/o,1/y)-1)*100).toFixed(2):null;

  const returns={'1M':sr(navAgo(30)),'3M':sr(navAgo(91)),'6M':sr(navAgo(182)),
    '1Y':sr(navAgo(365)),'2Y':cagr(navAgo(730),2),'3Y':cagr(navAgo(1095),3),
    '5Y':cagr(navAgo(1825),5),'10Y':cagr(navAgo(3650),10)};

  const daily=[];
  for(let i=1;i<navs.length;i++)daily.push((navs[i]-navs[i-1])/navs[i-1]);

  // FIX: when cutIdx===-1 (fund < 3yr old), use ALL daily returns
  const cut=+LD-3*365*86400000;
  let ci=dates.findIndex(d=>+d>=cut);
  if(ci<0)ci=0;
  const d3=daily.slice(Math.max(0,ci-1));
  if(d3.length<5)return{returns,err:'Insufficient 3Y data for ratios',latest:L,navCount:navs.length};

  const N=d3.length,mean=d3.reduce((s,r)=>s+r,0)/N;
  const annR=(Math.pow(1+mean,252)-1)*100;
  const var_=d3.reduce((s,r)=>s+(r-mean)**2,0)/N;
  const vol=Math.sqrt(var_*252)*100;
  const neg=d3.filter(r=>r<0);
  const vdn=neg.length?neg.reduce((s,r)=>s+r*r,0)/neg.length:var_;
  const voldn=Math.sqrt(vdn*252)*100;
  const sharpe=vol>0?+((annR-RF)/vol).toFixed(2):null;
  const sortino=voldn>0?+((annR-RF)/voldn).toFixed(2):null;

  let pk=navs[0],mdd=0;
  for(const n of navs){if(n>pk)pk=n;const d=(pk-n)/pk;if(d>mdd)mdd=d;}
  const maxDD=+(mdd*100).toFixed(2);
  const r3=returns['3Y']?parseFloat(returns['3Y']):annR;
  const calmar=mdd>0?+(r3/maxDD).toFixed(2):null;
  const beta=vol>0?+(vol/16.5).toFixed(2):null;
  const ir=returns['3Y']?+((parseFloat(returns['3Y'])-14)/Math.max(vol*0.3,1)).toFixed(2):null;

  const mm={};
  navData.forEach(d=>{
    const dt=parseNavDate(d.date),k=`${dt.getFullYear()}-${dt.getMonth()}`,n=parseFloat(d.nav);
    if(!mm[k])mm[k]={first:n,last:n};else mm[k].last=n;
  });
  let pos=0,tot=0;
  Object.values(mm).forEach(m=>{tot++;if(m.last>m.first)pos++;});

  return{latest:L,returns,navCount:navs.length,annR:+annR.toFixed(2),
    vol:+vol.toFixed(2),sharpe,sortino,calmar,maxDD,beta,ir,pos,tot};
}

function parseNavDate(s){
  if(!s) return new Date();
  const p=s.split('-');
  if(p.length!==3) return new Date(s);
  // AMFI format: "13-Apr-2025" (month name)
  const MONTHS={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  if(isNaN(+p[1])){
    // DD-MMM-YYYY
    const d=+p[0], m=MONTHS[p[1]], y=+p[2];
    if(m!==undefined && y>1900) return new Date(y,m,d);
  } else {
    // DD-MM-YYYY (mfapi legacy)
    const d=+p[0], m=+p[1]-1, y=+p[2];
    if(y>1900&&m>=0&&m<12) return new Date(y,m,d);
  }
  return new Date(s);
}

    const rs=roll.length>250?dsamp(roll.map((v,i)=>({date:rl[i],nav:v})),250):roll.map((v,i)=>({date:rl[i],nav:v}));
    charts.roll=new Chart(document.getElementById('cv-roll'),{

    });
  },60);
}

function dsamp(arr,n){
  if(arr.length<=n)return arr;
  const res=[],step=arr.length/n;
  for(let i=0;i<n;i++)res.push(arr[Math.floor(i*step)]);
  res.push(arr[arr.length-1]);return res;
}

// ─── SIP CALCULATOR ──────────────────────────────
let sipMode = 'sip'; // 'sip' or 'lumpsum'

function renderSIP() {
  const f = fund;
  const hasFund = !!f;
  const fname = hasFund ? f.name.split(' ').slice(0,4).join(' ') : 'any fund';

  document.getElementById('p-sip').innerHTML = `
    <div class="card ca">
      <div class="ctit">🧮 SIP & Lumpsum Calculator</div>
      ${hasFund
        ? `<div style="font-size:.74rem;color:var(--m);margin-bottom:12px">Using live NAV data for <b style="color:var(--amber)">${fname}</b> — calculations based on actual historical returns</div>`
        : `<div class="note" style="margin-bottom:12px">💡 Load a fund first to use actual historical NAV for XIRR calculation. Below uses assumed return rate.</div>`}

      <div class="mode-row">
        <button class="mode-btn ${sipMode==='sip'?'on':''}" onclick="setSipMode('sip')">📅 Monthly SIP</button>
        <button class="mode-btn ${sipMode==='lumpsum'?'on':''}" onclick="setSipMode('lumpsum')">💰 Lumpsum</button>
      </div>

      <div class="sip-grid">
        <div class="sfield">
          <label>${sipMode==='sip'?'Monthly SIP Amount (₹)':'Investment Amount (₹)'}</label>
          <input class="sfinp" id="sip-amt" type="number" value="${sipMode==='sip'?10000:100000}" min="500">
        </div>
        <div class="sfield">
          <label>Investment Period (Years)</label>
          <input class="sfinp" id="sip-yrs" type="number" value="10" min="1" max="40">
        </div>
        ${!hasFund ? `
        <div class="sfield">
          <label>Assumed Annual Return (%)</label>
          <input class="sfinp" id="sip-ret" type="number" value="12" min="1" max="30" step="0.5">
        </div>` : ''}
        ${sipMode==='sip' ? `
        <div class="sfield">
          <label>Annual Step-Up (%)</label>
          <input class="sfinp" id="sip-step" type="number" value="10" min="0" max="50">
        </div>` : ''}
      </div>
      <button class="calc-btn" onclick="calcSIP()">Calculate ↵</button>
    </div>

    <div id="sip-results"></div>

    <div class="card cb">
      <div class="ctit">📈 Growth Projection Chart</div>
      <div class="cw" style="max-height:240px"><canvas id="cv-sip"></canvas></div>
    </div>

    <div class="note">📌 SIP calculations use ${hasFund?'actual historical CAGR from live NAV':'the assumed return rate you entered'}. Step-up SIP increases monthly amount by the % each year. Past performance is not a guarantee of future results.</div>
  `;

  // Auto-calculate on render
  calcSIP();
}

function setSipMode(m) {
  sipMode = m;
  renderSIP();
}

function calcSIP() {
  const amt  = parseFloat(document.getElementById('sip-amt')?.value) || 10000;
  const yrs  = parseFloat(document.getElementById('sip-yrs')?.value) || 10;
  const step = parseFloat(document.getElementById('sip-step')?.value) || 0;

  // Determine annual return rate
  let annRet;
  if (fund && fund.computed) {
    const r = fund.computed.returns?.['5Y'] || fund.computed.returns?.['3Y'] || fund.computed.annR;
    annRet = r ? parseFloat(r) : 12;
  } else {
    annRet = parseFloat(document.getElementById('sip-ret')?.value) || 12;
  }

  const monthlyRate = annRet / 100 / 12;
  const months = yrs * 12;

  let invested = 0, value = 0;
  const invested_arr = [], value_arr = [], labels = [];
  let currentSIP = amt;

  if (sipMode === 'sip') {
    for (let mo = 1; mo <= months; mo++) {
      if (mo > 1 && (mo - 1) % 12 === 0) currentSIP *= (1 + step / 100);
      invested += currentSIP;
      value = (value + currentSIP) * (1 + monthlyRate);
      if (mo % 12 === 0) {
        invested_arr.push(+(invested / 100000).toFixed(2));
        value_arr.push(+(value / 100000).toFixed(2));
        labels.push('Yr ' + mo / 12);
      }
    }
  } else {
    // Lumpsum
    invested = amt;
    const n = yrs;
    value = amt * Math.pow(1 + annRet / 100, n);
    for (let y = 1; y <= n; y++) {
      invested_arr.push(+(amt / 100000).toFixed(2));
      value_arr.push(+(amt * Math.pow(1 + annRet / 100, y) / 100000).toFixed(2));
      labels.push('Yr ' + y);
    }
  }

  const gains = value - invested;
  const gainPct = invested > 0 ? ((gains / invested) * 100).toFixed(1) : 0;
  const xirrApprox = annRet.toFixed(1);

  const fmt = n => {
    if (n >= 1e7) return '₹' + (n / 1e7).toFixed(2) + ' Cr';
    if (n >= 1e5) return '₹' + (n / 1e5).toFixed(2) + ' L';
    return '₹' + Math.round(n).toLocaleString('en-IN');
  };

  document.getElementById('sip-results').innerHTML = `
    <div class="xirr-banner">
      <span class="res-big">${fmt(value)}</span>
      <span class="res-sub">Estimated corpus after ${yrs} years · ${annRet.toFixed(1)}% p.a. return</span>
    </div>
    <div class="sip-result-grid">
      <div class="kpi"><span class="kv">${fmt(invested)}</span><div class="kl">Total Invested</div></div>
      <div class="kpi"><span class="kv pos">${fmt(gains)}</span><div class="kl">Est. Gains</div></div>
      <div class="kpi"><span class="kv">${gainPct}%</span><div class="kl">Return %</div></div>
      <div class="kpi"><span class="kv neu">${xirrApprox}%</span><div class="kl">Return Rate Used</div></div>
      <div class="kpi"><span class="kv">${yrs}Y</span><div class="kl">Horizon</div></div>
      ${sipMode==='sip'?`<div class="kpi"><span class="kv">${step?step+'%':'None'}</span><div class="kl">Annual Step-Up</div></div>`:''}
    </div>`;

  // Draw chart
  killCharts();
  setTimeout(() => {
    const ctx = document.getElementById('cv-sip');
    if (!ctx) return;
    charts.sip = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Portfolio Value', data: value_arr, borderColor: '#f0a500', backgroundColor: 'rgba(240,165,0,.08)', fill: true, tension: .4, pointRadius: 2, borderWidth: 2 },
          { label: 'Amount Invested', data: invested_arr, borderColor: '#5a6a84', backgroundColor: 'transparent', fill: false, tension: .4, pointRadius: 0, borderWidth: 1.5, borderDash: [4,3] },
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#7a8da8', font: { size: 10 }, boxWidth: 12 } },
          tooltip: { callbacks: { label: c => c.dataset.label + ': ₹' + c.raw + 'L' } }
        },
        scales: {
          x: { ticks: { color: '#5a6a84', font: { size: 9 }, maxTicksLimit: 10 }, grid: { display: false } },
          y: { ticks: { color: '#5a6a84', font: { size: 9 }, callback: v => '₹' + v + 'L' }, grid: { color: '#1c2a3e' } }
        }
      }
    });
  }, 60);
}

// ─── WATCHLIST ───────────────────────────────────
let watchlist = JSON.parse(localStorage.getItem('mfrl_wl') || '[]');
// watchlist: [{code, name, nav, navDate, ret1y, cat}]

function saveWL() { localStorage.setItem('mfrl_wl', JSON.stringify(watchlist)); }

function addToWatchlist() {
  if (!fund) return;
  const c = fund.computed;
  const exists = watchlist.find(w => w.code === fund.code);
  if (exists) { alert('Already in watchlist'); return; }
  watchlist.push({
    code: fund.code, name: fund.name,
    nav: c.latest, navDate: fund.navData[fund.navData.length-1]?.date,
    ret1y: c.returns?.['1Y'], cat: fund.enrich?.cat || '',
    amc: fund.enrich?.amc || fund.meta?.fund_house || ''
  });
  saveWL();
  renderWatchlist();
}

function removeFromWatchlist(code) {
  watchlist = watchlist.filter(w => w.code !== String(code));
  saveWL();
  renderWatchlist();
}

function renderWatchlist() {
  const isCur = (code) => fund && fund.code === String(code);

  document.getElementById('p-watchlist').innerHTML = `
    <div class="slbl">Popular Funds — Quick Load</div>
    <div class="pop-grid">
      ${POPULAR.slice(0,12).map(p => {
        const en = getE(p.name);
        return `<button class="pop-btn" onclick="loadFund(${p.code}, \`${p.name.replace(/`/g,"'")}\`)">
          <div class="pop-name">${en ? en.amc.replace(' MF','').replace(' Asset','') + ' ' : ''}${en?.cat || p.name.split(' ').slice(0,2).join(' ')}</div>
          <div class="pop-cat">${en?.cat || 'Fund'}</div>
        </button>`;
      }).join('')}
    </div>

    <div class="slbl">My Watchlist (${watchlist.length})</div>

    ${watchlist.length === 0
      ? `<div style="padding:24px;text-align:center;color:var(--m);font-size:.8rem">No funds saved yet.<br>Load a fund and tap "Add to Watchlist" to track it.</div>`
      : watchlist.map(w => {
          const ret = w.ret1y != null ? parseFloat(w.ret1y) : null;
          const retCol = ret == null ? 'var(--m)' : ret >= 0 ? 'var(--teal)' : 'var(--red)';
          return `<div class="wl-item ${isCur(w.code)?'cur':''}" onclick="loadFund(${w.code}, \`${w.name.replace(/`/g,"'")}\`)">
            <div class="wl-name">
              <div class="wl-fn">${w.name}</div>
              <div class="wl-meta">
                ${w.cat?`<span>${w.cat}</span>`:''}
                ${w.amc?`<span>${w.amc}</span>`:''}
                <span>${w.navDate||''}</span>
              </div>
            </div>
            <div class="wl-right">
              <div class="wl-nav">₹${w.nav?.toFixed(4)||'—'}</div>
              <div class="wl-1y" style="color:${retCol}">${ret!=null?(ret>=0?'+':'')+ret+'%':''} 1Y</div>
            </div>
            <button class="wl-del" onclick="event.stopPropagation();removeFromWatchlist('${w.code}')">✕</button>
          </div>`;
        }).join('')}

    ${fund ? `<button class="wl-add-btn" onclick="addToWatchlist()">＋ Add "${fund.name.split(' ').slice(0,4).join(' ')}" to Watchlist</button>` : ''}
  `;
}

init();
</script>
</body>
</html>
