name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 -c "
          import os
          key = os.environ['ANTHROPIC_API_KEY']
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace('%%ANTHROPIC_API_KEY%%', key)
          with open('mf-forensic-analyser.html', 'w') as f:
              f.write(content)
          print('Key injected, length:', len(key))
          "

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
